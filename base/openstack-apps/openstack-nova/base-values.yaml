release_group: nova

conf:
  ceph:
    enabled: false
  enable_iscsi: true
  nova:
    DEFAULT:
      osapi_compute_workers: 4
      rpc_response_timeout: 120
      vif_plugging_is_fatal: true
      vif_plugging_timeout: 300
      ram_allocation_ratio: 1.0
      disk_allocation_ratio: 1.0
      cpu_allocation_ratio: 4.0
      metadata_workers: 2
      cross_az_attach: true
    libvirt:
      volume_use_multipath: true
      num_pcie_ports: 28
    cache:
      enabled: true
      backend: oslo_cache.memcache_pool
    oslo_messaging_rabbit:
      amqp_durable_queues: false
      rabbit_ha_queues: false
      rabbit_quorum_queue: true
      rabbit_transient_quorum_queue: false
      use_queue_manager: false
      rabbit_interval_max: 10
      heartbeat_rate: 3
      heartbeat_timeout_threshold: 60
      heartbeat_in_pthread: true
      kombu_reconnect_delay: 0.5
    conductor:
      workers: 10
    scheduler:
      workers: 10
  nova_api_uwsgi:
    uwsgi:
      processes: 2
      threads: 1
  nova_metadata_uwsgi:
    uwsgi:
      processes: 2
      threads: 1
  logging:
    logger_nova:
      level: INFO
  rabbitmq:
    policies: []

pod:
  replicas:
    api_metadata: 3
    osapi: 3
    conductor: 3
    scheduler: 3
    novncproxy: 3
    spiceproxy: 1
    serialproxy: 1

  resources:
    enabled: true
    api:
      requests:
        memory: "256Mi"
    conductor:
      requests:
        memory: "512Mi"

network:
  backend:
    - ovn
  osapi:
    ingress:
      public: false
  metadata:
    ingress:
      public: false
  novncproxy:
    ingress:
      public: false
  serialproxy:
    ingress:
      public: false
  spiceproxy:
    ingress:
      public: false

secrets:
  identity:
    admin: nova-keystone-admin
    cinder: nova-keystone-user
    nova: nova-keystone-nova
    swift: nova-keystone-swift
    service: nova-keystone-service
    test: nova-keystone-test
    glance: nova-keystone-glance
    neutron: nova-keystone-neutron
    placement: nova-keystone-placement
    skyline: nova-keystone-skyline

dependencies:
  dynamic:
    targeted:
      ovn:
        compute:
          pod: []
  static:
    api:
      jobs:
        - nova-db-sync
        - nova-ks-user
        - nova-ks-endpoints
    api_metadata:
      jobs:
        - nova-db-sync
        - nova-ks-user
        - nova-ks-endpoints
    archive_deleted_rows:
      jobs:
        - nova-db-sync
    cell_setup:
      jobs:
        - nova-db-sync
    compute:
      pods: []
      jobs:
        - nova-db-sync
    compute_ironic:
      jobs:
        - nova-db-sync
    conductor:
      jobs:
        - nova-db-sync
    db_sync:
      jobs: []
    scheduler:
      jobs:
        - nova-db-sync
    service_cleaner:
      jobs:
        - nova-db-sync

manifests:
  deployment_spiceproxy: false
  ingress_metadata: false
  ingress_novncproxy: false
  ingress_osapi: false
  ingress_spiceproxy: false
  job_db_init: false
  job_rabbit_init: false
  job_storage_init: false
  pod_rally_test: false
  secret_ingress_tls: false
  service_ingress_metadata: false
  service_ingress_novncproxy: false
  service_ingress_osapi: false
  service_ingress_spiceproxy: false
  service_spiceproxy: true
  statefulset_compute_ironic: false
