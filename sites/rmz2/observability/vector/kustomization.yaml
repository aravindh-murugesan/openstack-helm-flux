---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system

configMapGenerator:
  - name: openstack-helm-flux-vector-values-override
    behavior: create
    options:
      disableNameSuffixHash: true
      labels:
        reconcile.fluxcd.io/watch: Enabled
    files:
      - values.yaml=value-overrides.yaml

resources:
  - ../../../../base/observability/vector
