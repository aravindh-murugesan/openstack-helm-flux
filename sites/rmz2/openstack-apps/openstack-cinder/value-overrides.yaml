images:
  tags:
    db_init: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    cinder_db_sync: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    db_drop: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    ks_user: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    ks_service: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    ks_endpoints: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    cinder_api: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    bootstrap: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    cinder_scheduler: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    cinder_volume: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    cinder_volume_usage_audit: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    cinder_db_purge: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    cinder_storage_init: "quay.io/airshipit/ceph-config-helper:latest-ubuntu_jammy"
    cinder_backup: "quay.io/airshipit/cinder:2026.1-ubuntu_noble"
    cinder_backup_storage_init: "quay.io/airshipit/ceph-config-helper:latest-ubuntu_jammy"

conf:
  backends:
    rbd1: null
  cinder:
    DEFAULT:
      enabled_backends: ""

pod:
  security_context:
    cinder_api:
      container:
        cinder_api:
          allowPrivilegeEscalation: true
          privileged: true
    cinder_backup:
      container:
        cinder_backup:
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false
    cinder_volume:
      container:
        cinder_volume:
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false
    cinder_scheduler:
      container:
        cinder_volume:
          privileged: true
  mounts:
    cinder_volume:
      cinder_volume:
        volumes: &iscsi_volumes
          - name: etciscsi
            hostPath:
              path: /etc/iscsi
          - name: dev
            hostPath:
              path: /dev
          - name: sys         
            hostPath:
              path: /sys
          - name: run          
            hostPath:
              path: /run
        volumeMounts: &iscsi_mounts
          - name: etciscsi
            mountPath: /etc/iscsi
          - name: dev
            mountPath: /dev
          - name: sys
            mountPath: /sys
          - name: run
            mountPath: /run
    cinder_backup:
      cinder_backup:
        volumes: *iscsi_volumes
        volumeMounts: *iscsi_mounts
  useHostNetwork:
    volume: true
    backup: true
  replicas:
    api: 3
    volume: 1
    scheduler: 3
    backup: 1
  lifecycle:
    disruption_budget:
      api:
        min_available: 1
      scheduler:
        min_available: 1

  resources:
    enabled: true
    api:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"
    scheduler:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"
    volume:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"

network:
  api:
    ingress:
      public: false

dependencies:
  dynamic:
    common:
      local_image_registry:
        jobs: null
  static:
    api:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
      services:
        - endpoint: internal
          service: oslo_db
        - endpoint: internal
          service: identity
    db_sync:
      jobs: null
    backup:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    db_purge:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    scheduler:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    volume:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints
    volume_usage_audit:
      jobs:
        - cinder-db-sync
        - cinder-ks-user
        - cinder-ks-endpoints

secrets:
  identity:
    admin: cinder-keystone-admin
    cinder: cinder-keystone-user
    nova: cinder-keystone-nova
    swift: cinder-keystone-swift
    service: cinder-keystone-service
    test: cinder-keystone-test
    glance: cinder-keystone-glance
    neutron: cinder-keystone-neutron
    placement: cinder-keystone-placement
    skyline: cinder-keystone-skyline

manifests:
  job_backup_storage_init: false
  job_bootstrap: false
  job_clean: false
  job_db_init: false
  job_db_drop: false
  job_rabbit_init: false
  job_storage_init: false
  pod_rally_test: false
  secret_db: false
  secret_ingress_tls: false
  secret_rabbitmq: false
  secret_registry: false
  service_ingress_api: false
  deployment_backup: true
  deployment_volume: true
  secret_keystone: true
  secret_ks_etc: true
  configmap_bin: true

labels:
  volume:
    node_selector_key: openstack-compute-node
    node_selector_value: enabled
  backup:
    node_selector_key: openstack-compute-node
    node_selector_value: enabled

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: cinder-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      hostnames:
        - "{{ .Values.endpoints.volume.host_fqdn_override.public.host }}"
      parentRefs:
        - name: tata-internal-gw
          namespace: envoy-gateway-system
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          timeouts:
            request: 3600s
            backendRequest: 3600s
          backendRefs:
            - name: cinder-api
              port: 8776
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: cinder
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: cinder
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      passwordSecretKeyRef:
        name: cinder-db-password
        key: password
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: cinder-grant
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      privileges:
        - "ALL"
      database: "cinder"
      table: "*"
      username: cinder
      grantOption: true
      host: "%"
      retryInterval: 5s
  - apiVersion: rabbitmq.com/v1beta1
    kind: User
    metadata:
      name: cinder
    spec:
      tags:
        - management
        - policymaker
      rabbitmqClusterReference:
        name: rabbitmq
      importCredentialsSecret:
        name: cinder-rabbitmq-password
  - apiVersion: rabbitmq.com/v1beta1
    kind: Vhost
    metadata:
      name: cinder-vhost
    spec:
      name: "cinder"
      defaultQueueType: quorum
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Permission
    metadata:
      name: cinder-permission
    spec:
      vhost: "cinder"
      userReference:
        name: "cinder"
      permissions:
        write: ".*"
        configure: ".*"
        read: ".*"
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Policy
    metadata:
      name: cinder-notifications-ttl
    spec:
      name: cinder-notifications-ttl
      vhost: "cinder"
      pattern: "^notifications.*"
      applyTo: "queues"
      priority: 1
      definition:
        message-ttl: 86400000
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Policy
    metadata:
      name: cinder-quorum-three-replicas
    spec:
      name: cinder-quorum-three-replicas
      vhost: "cinder"
      pattern: ".*"
      applyTo: queues
      definition:
        target-group-size: 3
      priority: 0
      rabbitmqClusterReference:
        name: rabbitmq
