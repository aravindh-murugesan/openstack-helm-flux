images:
  tags:
    bootstrap: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    db_drop: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    db_init: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    ks_user: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    ks_service: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    ks_endpoints: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    nova_api: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_cell_setup: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_cell_setup_init: "quay.io/airshipit/openstack-client:2026.1-ubuntu_noble"
    nova_compute: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_compute_ssh: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_conductor: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_db_sync: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_novncproxy: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_novncproxy_assets: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_scheduler: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_spiceproxy: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_spiceproxy_assets: "quay.io/airshipit/nova:2026.1-ubuntu_noble"
    nova_service_cleaner: "quay.io/airshipit/ceph-config-helper:latest-ubuntu_jammy"

pod:
  security_context:
    compute:
      container:
        nova_compute:
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false

conf:
  nova:
    filter_scheduler:
      enabled_filters: ComputeFilter,ComputeCapabilitiesFilter,ImagePropertiesFilter,ServerGroupAntiAffinityFilter,ServerGroupAffinityFilter,AggregateInstanceExtraSpecsFilter

console:
  console_kind: novnc

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: nova-api-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      parentRefs:
        - name: tata-internal-gw
          namespace: envoy-gateway-system
      hostnames:
        - "{{ .Values.endpoints.compute.host_fqdn_override.public.host }}"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: nova-api
              port: 8774
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: nova-novncproxy-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      parentRefs:
        - name: tata-internal-gw
          namespace: envoy-gateway-system
      hostnames:
        - "{{ .Values.endpoints.compute_novnc_proxy.host_fqdn_override.public.host }}"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: nova-novncproxy
              port: 6080
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: nova-metadata-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      parentRefs:
        - name: tata-internal-gw
          namespace: envoy-gateway-system
      hostnames:
        - "{{ .Values.endpoints.compute_metadata.host_fqdn_override.public.host }}"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: nova-api-metadata
              port: 8775
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: nova
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      passwordSecretKeyRef:
        name: nova-db-password
        key: password
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: nova-cell0
    spec:
      name: "nova_cell0"
      mariaDbRef:
        name: mariadb
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: nova-cell0-grant
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      privileges:
        - "ALL"
      database: "nova_cell0"
      table: "*"
      username: nova
      grantOption: true
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: nova-api
    spec:
      name: "nova_api"
      mariaDbRef:
        name: mariadb
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: nova-api-grant
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      privileges:
        - "ALL"
      database: "nova_api"
      table: "*"
      username: nova
      grantOption: true
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: nova
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: nova-grant
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      privileges:
        - "ALL"
      database: "nova"
      table: "*"
      username: nova
      grantOption: true
      host: "%"
      retryInterval: 5s
  - apiVersion: rabbitmq.com/v1beta1
    kind: User
    metadata:
      name: nova
    spec:
      tags:
        - management
        - policymaker
      rabbitmqClusterReference:
        name: rabbitmq
      importCredentialsSecret:
        name: nova-rabbitmq-password
  - apiVersion: rabbitmq.com/v1beta1
    kind: Vhost
    metadata:
      name: nova-vhost
    spec:
      name: "nova"
      defaultQueueType: quorum
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Permission
    metadata:
      name: nova-permission
    spec:
      vhost: "nova"
      userReference:
        name: "nova"
      permissions:
        write: ".*"
        configure: ".*"
        read: ".*"
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Policy
    metadata:
      name: nova-notifications-ttl
    spec:
      name: nova-notifications-ttl
      vhost: "nova"
      pattern: "^notifications.*"
      applyTo: "queues"
      priority: 1
      definition:
        message-ttl: 86400000
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Policy
    metadata:
      name: nova-quorum-three-replicas
    spec:
      name: nova-quorum-three-replicas
      vhost: "nova"
      pattern: ".*"
      applyTo: queues
      definition:
        target-group-size: 3
      priority: 0
      rabbitmqClusterReference:
        name: rabbitmq
  - apiVersion: rabbitmq.com/v1beta1
    kind: Queue
    metadata:
      name: nova-queue
      namespace: openstack
      labels:
        app.kubernetes.io/managed-by: "Helm"
      annotations:
        helm.sh/resource-policy: keep
        meta.helm.sh/release-name: "nova"
        meta.helm.sh/release-namespace: "openstack"
    spec:
      name: nova-qq
      vhost: "nova"
      type: quorum
      autoDelete: false
      durable: true
      rabbitmqClusterReference:
        name: rabbitmq
        namespace: openstack
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: nova-api
      namespace: "{{ .Release.Namespace }}"
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: nova-api
      minReplicas: 3
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 75
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 1
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
