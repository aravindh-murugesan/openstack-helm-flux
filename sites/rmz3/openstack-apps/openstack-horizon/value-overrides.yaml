images:
  tags:
    db_init: quay.io/airshipit/openstack-client:2025.2-ubuntu_noble
    db_drop: quay.io/airshipit/openstack-client:2025.2-ubuntu_noble
    horizon_db_sync: quay.io/airshipit/horizon:2025.2-ubuntu_noble
    horizon: quay.io/airshipit/horizon:2025.2-ubuntu_noble

pod:
  lifecycle:
    disruption_budget:
      horizon:
        min_available: 1
  resources:
    enabled: true
    server:
      requests:
        memory: "1024Mi"
        cpu: "1000m"
      limits:
        memory: "1024Mi"
        cpu: "2000m"

conf:
  horizon:
    local_settings:
      use_ssl: "True"
      csrf_cookie_secure: "True"
      session_cookie_secure: "True"
      allowed_hosts:
        - "*"
      csrf_trusted_origins:
        - "*"
      openstack_cinder_features:
        enable_backup: "False"

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: horizon
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: horizon
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      passwordSecretKeyRef:
        name: horizon-db-password
        key: password
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: horizon-grant
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      privileges:
        - "ALL"
      database: "horizon"
      table: "*"
      username: horizon
      grantOption: true
      host: "%"
      retryInterval: 5s
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: horizon-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      parentRefs:
        - name: tata-internal-gw
          namespace: envoy-gateway-system
      hostnames:
        - "ui.rmz3.com"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: horizon-int
              port: 80
