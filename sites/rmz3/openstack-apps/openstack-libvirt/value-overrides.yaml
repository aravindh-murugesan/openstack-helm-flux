images:
  tags:
    libvirt: quay.io/airshipit/libvirt:2026.1-ubuntu_noble

conf:
  dynamic_options:
    libvirt:
      listen_interface: null
      listen_address: 127.0.0.1
  init_modules:
    enabled: false

libvirt:
  extraContainers:
    - name: libvirt-exporter
      image: ghcr.io/inovex/prometheus-libvirt-exporter:v2.4.0
      imagePullPolicy: IfNotPresent
      args:
        - --libvirt.uri=/run/libvirt/libvirt-sock-ro
      ports:
        - name: metrics
          protocol: TCP
          containerPort: 9177
      livenessProbe:
        httpGet:
          path: /metrics
          port: 9177
        initialDelaySeconds: 30
        periodSeconds: 60
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /metrics
          port: 9177
        initialDelaySeconds: 15
        periodSeconds: 60
        timeoutSeconds: 5
      securityContext:
        privileged: true
      volumeMounts:
        - name: run
          mountPath: /run
          mountPropagation: Bidirectional
