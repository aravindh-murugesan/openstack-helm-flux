images:
  tags:
    skyline_db_sync: quay.io/airshipit/skyline:2026.1-ubuntu_noble
    skyline: quay.io/airshipit/skyline:2026.1-ubuntu_noble
    skyline_nginx: quay.io/airshipit/skyline:2026.1-ubuntu_noble
    db_init: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble
    dep_check: quay.io/airshipit/kubernetes-entrypoint:latest-ubuntu_noble
    ks_user: quay.io/airshipit/openstack-client:2026.1-ubuntu_noble

conf:
  skyline:
    openstack:
      default_region: RMZ

extraObjects:
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Database
    metadata:
      name: skyline
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      characterSet: utf8
      collate: utf8_general_ci
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: User
    metadata:
      name: skyline
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      passwordSecretKeyRef:
        name: skyline-db-password
        key: password
      maxUserConnections: 0
      host: "%"
      retryInterval: 5s
  - apiVersion: k8s.mariadb.com/v1alpha1
    kind: Grant
    metadata:
      name: skyline-grant
    spec:
      mariaDbRef:
        name: mariadb
        waitForIt: true
      privileges:
        - "ALL"
      database: "skyline"
      table: "*"
      username: skyline
      grantOption: true
      host: "%"
      retryInterval: 5s
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: skyline-route
      namespace: "{{ .Release.Namespace }}"
    spec:
      parentRefs:
        - name: tata-internal-gw
          namespace: envoy-gateway-system
      hostnames:
        - "{{ .Values.endpoints.skyline.host_fqdn_override.public.host }}"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: skyline-api
              port: 9999
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: skyline-api
      namespace: "{{ .Release.Namespace }}"
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: skyline-api
      minReplicas: 3
      maxReplicas: 10
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 75
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 1
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
