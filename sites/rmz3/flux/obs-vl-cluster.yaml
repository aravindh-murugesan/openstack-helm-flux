---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-vl-cluster
  namespace: flux-system
  labels:
    openstack-helm-flux/component-group: observability
spec:
  interval: 60m
  timeout: 10m
  targetNamespace: observability
  dependsOn:
    - name: infra-vm-operator
  sourceRef:
    kind: GitRepository
    name: openstack-helm-flux-repo
    namespace: flux-system
  path: ./sites/rmz3/observability/vl-cluster
  prune: true
  wait: true
  healthCheckExprs:
    - apiVersion: operator.victoriametrics.com/v1
      kind: VLCluster
      current: "has(status.updateStatus) && status.updateStatus == 'operational'"
  force: true
