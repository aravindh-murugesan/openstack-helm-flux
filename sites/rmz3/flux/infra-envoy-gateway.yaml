---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infra-envoy-gateway
  namespace: flux-system
  labels:
    openstack-helm-flux/component-group: operators
spec:
  interval: 30m
  targetNamespace: envoy-gateway-system
  releaseName: envoy-gateway
  chart:
    spec:
      chart: gateway-helm
      version: "v1.8.1"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
  install:
    createNamespace: true
  values:
    deployment:
      nodeSelector:
        openstack-control-plane: enabled
