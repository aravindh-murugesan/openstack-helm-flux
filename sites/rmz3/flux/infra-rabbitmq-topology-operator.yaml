apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-rabbitmq-topology-operator
  namespace: flux-system
  labels:
    openstack-helm-flux/component-group: operators
spec:
  interval: 30m
  targetNamespace: rabbitmq-system
  dependsOn:
    - name: infra-rabbitmq-cluster-operator
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: openstack-helm-flux-repo
    namespace: flux-system
  path: ./sites/rmz2/infrastructure/rabbitmq-topology-operator
  prune: true
  wait: true
